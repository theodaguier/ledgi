name: ledgi

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        - NEXT_PUBLIC_BETTER_AUTH_URL=${NEXT_PUBLIC_BETTER_AUTH_URL:-http://localhost:3000}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    container_name: ledgi_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-ledgi}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-ledgi}?schema=public
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_BETTER_AUTH_URL: ${NEXT_PUBLIC_BETTER_AUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      AVATAR_STORAGE_DRIVER: local
    volumes:
      - ledgi_uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: ledgi_migrator
    profiles:
      - migrate
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-ledgi}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-ledgi}?schema=public
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: ledgi_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ledgi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-ledgi}
    volumes:
      - ledgi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ledgi} -d ${POSTGRES_DB:-ledgi}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ledgi_uploads:
  ledgi_pgdata:
